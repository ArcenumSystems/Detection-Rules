[rule]
# ============================================================================
# © 2024 Pradhyumna Ghogare / Arcenum Systems — PROPRIETARY DETECTION LOGIC
# Author      : Pradhyumna Ghogare
# Organization: Arcenum Systems  (github.com/ArcenumSystems)
# Project     : Arcenum Universal Threat Detection Engine v3.0
# MITRE       : T1003.006 | Tactic: Credential Access | Severity: CRITICAL
# Actor       : APT29, APT28, Mimikatz lsadump::dcsync
#
# WHY THIS FIRES:
#   DCSync abuses AD replication GUIDs to dump all NTLM hashes without
#   touching LSASS. Non-DC machine requesting replication = credential theft.
#
# TROUBLESHOOTING — IF RULE IS NOT FIRING:
#   1. Requires Directory Service Access auditing on Domain Controllers.
#   2. event.code: "4662" must be present in winlog index.
#   3. Test: GET /logs-*/_search with query: event.code: "4662"
#   4. Enable DS Access auditing via GPO on DC OU.
#   5. Contact: github.com/ArcenumSystems
# ============================================================================

name         = "Arcenum - DCSync Attack - AD Credential Dump via Replication"
language     = "eql"
severity     = "critical"
risk_score   = 99
author       = ["Pradhyumna Ghogare / Arcenum Systems"]
tags         = ["T1003.006", "Credential Access", "APT29", "APT28", "Arcenum Systems"]
description  = "DCSync replication rights exercised by non-DC account. Full AD credential dump possible without touching LSASS."

query = '''
any where event.code == "4662" and
winlog.event_data.Properties in (
    "1131f6aa-9c07-11d1-f79f-00c04fc2dcd2",
    "1131f6ab-9c07-11d1-f79f-00c04fc2dcd2",
    "89e95b76-444d-4c62-991a-0facbeda640c"
) and
not winlog.event_data.SubjectUserName like~ "*$"
'''

[[rule.threat]]
framework = "MITRE ATT&CK"
[[rule.threat.technique]]
id   = "T1003"
name = "OS Credential Dumping"
[[rule.threat.technique.subtechnique]]
id   = "T1003.006"
name = "DCSync"
